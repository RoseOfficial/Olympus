name: Lines of Code Badge

on:
  push:
    branches: [main]

jobs:
  loc-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tokei
        run: cargo install tokei

      - name: Count lines
        id: tokei
        run: |
          LINES=$(tokei --output json | jq '.Total.code')
          FORMATTED=$(printf "%'d" $LINES)
          echo "lines=$FORMATTED" >> $GITHUB_OUTPUT

      - name: Update Gist
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 08b9bb4fa4194c23fd7d8e00fa2b5f0d
          filename: loc.json
          label: lines of code
          message: ${{ steps.tokei.outputs.lines }}
          color: blue
