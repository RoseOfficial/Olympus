name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud
        run: |
          curl -sL https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -o dalamud.zip
          unzip -q dalamud.zip -d ~/dalamud

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore -p:DalamudLibPath=$HOME/dalamud/

      - name: Build Tests
        run: dotnet build Olympus.Tests/Olympus.Tests.csproj -p:DalamudLibPath=$HOME/dalamud/

      - name: Test
        run: dotnet test Olympus.Tests/Olympus.Tests.csproj --no-build
